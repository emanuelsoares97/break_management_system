{% extends "base.html" %}

{% block title %}Login - Break Management System{% endblock %}

{% block extra_css %}
	<style>
		.page {
			max-width: 460px;
			margin: 30px auto;
		}

		.auth-card {
			max-width: 400px;
			margin: 0 auto;
		}

		.auth-card h1 {
			text-align: center;
			margin-bottom: 8px;
		}

		.auth-subtitle {
			text-align: center;
			margin-bottom: 20px;
			color: #64748b;
			font-size: 14px;
		}

		.form-submit {
			width: 100%;
			margin-top: 6px;
		}

		.footer-text {
			text-align: center;
			margin-top: 16px;
			color: #64748b;
			font-size: 12px;
		}
	</style>
{% endblock %}

{% block content %}
	<div class="auth-card">
		<h1>Sign In</h1>
		<p class="auth-subtitle">Use your team credentials to access the dashboard.</p>

		<form method="POST" action="{% url 'accounts:login' %}">
			{% csrf_token %}

			<div class="form-row">
				<label for="username">Username</label>
				<input
					type="text"
					id="username"
					name="username"
					required
					autofocus
					placeholder="Enter your username"
				>
			</div>

			<div class="form-row">
				<label for="password">Password</label>
				<input
					type="password"
					id="password"
					name="password"
					required
					placeholder="Enter your password"
				>
			</div>

			<button type="submit" class="btn form-submit">Sign In</button>
		</form>

		<div class="footer-text">
			<p>For internal tests, use the seeded test credentials.</p>
		</div>
	</div>
{% endblock %}
